clutter_classes:
  small_debris:
    interaction_mode: sweep
    physical:
      mass_kg: 0.001
      diameter_m: 0.005
      friction: 0.3
    visual:
      color_rgb: [0.4, 0.3, 0.2]
    examples: [sand_grain, food_crumb, leaf_fragment]

  fabric_dust:
    interaction_mode: sweep
    physical:
      mass_kg: 0.0005
      patch_diameter_m: 0.05
      friction: 0.6
      adhesion_to_fabric: true
    visual:
      color_rgb: [0.5, 0.5, 0.5]
      opacity: 0.4

  medium_object:
    interaction_mode: grasp
    physical:
      mass_kg_range: [0.05, 0.5]
      bbox_m_range: [[0.05, 0.05, 0.05], [0.15, 0.15, 0.2]]
      friction: 0.7
    visual:
      color_palette:
        - [0.8, 0.2, 0.2]
        - [0.2, 0.8, 0.2]
        - [0.2, 0.2, 0.8]
        - [0.8, 0.8, 0.2]
    examples: [toy_block, drink_cup, snack_wrapper, mobile_phone, coin_purse]

  liquid_spill:
    interaction_mode: spot_clean
    physical:
      mass_kg: 0.0
      patch_diameter_m_range: [0.05, 0.15]
      contact_force_target_n: 5.0
    visual:
      color_rgb: [0.4, 0.2, 0.1]    # coffee-color default
      opacity: 0.7
    examples: [coffee_spill, water_spill, soda_drip]
