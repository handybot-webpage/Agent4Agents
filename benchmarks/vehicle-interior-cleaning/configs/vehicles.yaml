vehicles:
  sedan:
    cabin_volume_m3: 3.0
    footprint_m: [4.8, 1.8, 1.5]    # L W H, exterior
    cabin_dims_m: [2.4, 1.5, 1.1]   # L W H, interior cabin only
    seat_rows: 2
    seats_per_row: [3, 0]            # row 2 hidden in v0.1 procedural gen
    cargo_partitioned: true          # trunk separate
    cup_holders: 4
    obstacles:
      - dashboard_curve
      - gear_shifter
      - rearview_mirror
      - left_side_mirror_inner
      - right_side_mirror_inner
      - steering_wheel
    fragile_parts:
      - dashboard
      - rearview_mirror
      - windshield
      - steering_wheel

  suv:
    cabin_volume_m3: 4.5
    footprint_m: [4.9, 2.0, 1.8]
    cabin_dims_m: [2.6, 1.7, 1.3]
    seat_rows: 3
    seats_per_row: [2, 3, 2]         # row 3 hidden in v0.1
    cargo_partitioned: false
    cup_holders: 6
    obstacles:
      - dashboard_curve
      - gear_shifter
      - rearview_mirror
      - center_console_high
      - steering_wheel
    fragile_parts:
      - dashboard
      - rearview_mirror
      - windshield
      - steering_wheel

  hatchback:
    cabin_volume_m3: 2.7
    footprint_m: [4.2, 1.7, 1.5]
    cabin_dims_m: [2.2, 1.5, 1.1]
    seat_rows: 2
    seats_per_row: [2, 3]
    cargo_partitioned: false         # rear seatback fold
    cup_holders: 2
    obstacles:
      - dashboard_curve
      - gear_shifter
      - rearview_mirror
      - steering_wheel
    fragile_parts:
      - dashboard
      - rearview_mirror
      - windshield
      - steering_wheel
